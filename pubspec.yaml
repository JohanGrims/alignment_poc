name: alignment_poc
description: A proof of concept for Vecalign sentence alignment using Rust and ONNX.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  file_picker: ^8.0.0
  http: ^1.2.0
  path_provider: ^2.1.2
  rust_lib_alignment_poc:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
