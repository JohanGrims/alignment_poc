name: Build Windows and Linux

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true
      - name: Install flutter dependencies
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux
      - name: Download Models
        run: |
          mkdir -p build/linux/x64/release/bundle/data/models
          curl -L -o build/linux/x64/release/bundle/data/models/model_quantized.onnx https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/onnx/model_quantized.onnx
          curl -L -o build/linux/x64/release/bundle/data/models/tokenizer.json https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/tokenizer.json
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alignment-poc-linux
          path: build/linux/x64/release/bundle/

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true
      - name: Install flutter dependencies
        run: flutter pub get
      - name: Build Windows
        env:
          RUSTFLAGS: "-C target-feature=-crt-static"
          CFLAGS: "-MD"
          CXXFLAGS: "-MD"
        run: flutter build windows
      - name: Download Models
        shell: bash
        run: |
          mkdir -p build/windows/x64/runner/Release/data/models
          curl -L -o build/windows/x64/runner/Release/data/models/model_quantized.onnx https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/onnx/model_quantized.onnx
          curl -L -o build/windows/x64/runner/Release/data/models/tokenizer.json https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/tokenizer.json
      - name: Build Windows Setup
        run: '& "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows\installer.iss'
      - name: Upload Windows Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alignment-poc-windows-setup
          path: build/windows/x64/installer/Alignment_POC_Setup.exe
